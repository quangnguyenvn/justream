<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="justream vintage icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7e8c5"/>
      <stop offset="1" stop-color="#d9b982"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2d1d"/>
      <stop offset="1" stop-color="#1f1810"/>
    </linearGradient>
  </defs>

  <!-- Outer vintage badge -->
  <circle cx="256" cy="256" r="242" fill="url(#bg)" stroke="#3f2d18" stroke-width="20"/>
  <circle cx="256" cy="256" r="206" fill="#ecd7ad" stroke="#6a4a26" stroke-width="8" stroke-dasharray="6 10"/>

  <!-- Inner terminal-like shield -->
  <rect x="116" y="124" width="280" height="264" rx="22" fill="url(#inner)" stroke="#8a6332" stroke-width="8"/>
  <rect x="134" y="144" width="244" height="24" rx="8" fill="#ad8250"/>
  <circle cx="154" cy="156" r="5" fill="#2c2014"/>
  <circle cx="172" cy="156" r="5" fill="#2c2014"/>
  <circle cx="190" cy="156" r="5" fill="#2c2014"/>

  <!-- Stream wave -->
  <path d="M154 274c20-22 40-22 60 0s40 22 60 0 40-22 60 0 40 22 60 0"
        fill="none" stroke="#f2d7a4" stroke-width="16" stroke-linecap="round"/>
  <path d="M154 314c20-22 40-22 60 0s40 22 60 0 40-22 60 0 40 22 60 0"
        fill="none" stroke="#c9a26a" stroke-width="10" stroke-linecap="round"/>

  <!-- Small bolt accent -->
  <path d="M246 206h34l-20 34h24l-44 54 12-38h-26z" fill="#f0c277" stroke="#6d4b24" stroke-width="4"/>

  <!-- Text -->
  <text x="256" y="426" text-anchor="middle" font-family="monospace" font-size="34" letter-spacing="3" fill="#3f2d18">
    JUSTREAM
  </text>
</svg>
